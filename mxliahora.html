<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MXLI AHORA</title>

<style>
body{
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg,#1e2a44,#2f3e5c);
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  margin-top:20px;
}

.sub{
  text-align:center;
  opacity:0.7;
}

.card{
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  padding:15px;
  margin-top:20px;
}

.line{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.line:last-child{
  border-bottom:none;
}

.green{color:#4cd964;}
.yellow{color:#ffd60a;}
.red{color:#ff453a;}
</style>
</head>

<body>

<div class="container">

<h1>📍 MXLI AHORA</h1>
<div class="sub">Garitas Mexicali en tiempo real</div>

<div id="fechaHora" class="sub">Cargando...</div>

<!-- CENTRO -->
<div class="card">
<h3>📍 Centro</h3>

<div class="line">🚗 General <span id="centro-general">--</span></div>
<div class="line">🟦 Ready <span id="centro-ready">--</span></div>
<div class="line">⚡ Sentri <span id="centro-sentri">--</span></div>
<div class="line">🚶 Peatonal <span id="centro-peaton">--</span></div>
</div>

<!-- NUEVO -->
<div class="card">
<h3>📍 Nuevo Mexicali</h3>

<div class="line">🚗 General <span id="nuevo-general">--</span></div>
<div class="line">🟦 Ready <span id="nuevo-ready">--</span></div>
<div class="line">⚡ Sentri <span id="nuevo-sentri">--</span></div>
<div class="line">🚶 Peatonal <span id="nuevo-peaton">--</span></div>
</div>

</div>

<script>

// HORA
function actualizarHora(){
  const ahora = new Date();
  document.getElementById("fechaHora").innerText =
    ahora.toLocaleString("es-MX", {
      timeZone:"America/Tijuana",
      weekday:"long",
      hour:"numeric",
      minute:"numeric"
    }) + " • 🌡️ 26°C Mexicali";
}

setInterval(actualizarHora,1000);
actualizarHora();

// COLORES
function colorTiempo(valor){
  if(valor <= 15) return "green";
  if(valor <= 60) return "yellow";
  return "red";
}

// API
async function cargarDatos(){
  try{
    const res = await fetch("https://raspy-sky-1be8.mxliahora.workers.dev");
    const data = await res.json();

    function set(id, valor){
      const el = document.getElementById(id);
      el.innerText = valor + " min";
      el.className = colorTiempo(valor);
    }

    set("centro-general", data.centro.general);
    set("centro-ready", data.centro.ready);
    set("centro-sentri", data.centro.sentri);
    set("centro-peaton", data.centro.peaton);

    set("nuevo-general", data.nuevo.general);
    set("nuevo-ready", data.nuevo.ready);
    set("nuevo-sentri", data.nuevo.sentri);
    set("nuevo-peaton", data.nuevo.peaton);

  }catch(e){
    console.log("ERROR API:", e);
  }
}

cargarDatos();
setInterval(cargarDatos,30000);

</script>

</body>
</html>
