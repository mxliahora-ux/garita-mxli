<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MXLI AHORA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.card{
  background:#1e293b;
  padding:20px;
  margin:20px;
  border-radius:15px;
}

.line{
  margin:10px 0;
  font-size:18px;
}
</style>
</head>

<body>

<h1>📍 MXLI AHORA</h1>

<div class="card">
<h2>Centro</h2>

<div class="line">General: <span id="centro-general">--</span></div>
<div class="line">Ready: <span id="centro-ready">--</span></div>
<div class="line">Sentri: <span id="centro-sentri">--</span></div>
<div class="line">Peatonal: <span id="centro-peaton">--</span></div>

</div>

<div class="card">
<h2>Nuevo Mexicali</h2>

<div class="line">General: <span id="nuevo-general">--</span></div>
<div class="line">Ready: <span id="nuevo-ready">--</span></div>
<div class="line">Sentri: <span id="nuevo-sentri">--</span></div>
<div class="line">Peatonal: <span id="nuevo-peaton">--</span></div>

</div>

<script>

async function cargarDatos(){
  try{
    const res = await fetch("https://raspy-sky-1be8.mxliahora.workers.dev");
    const data = await res.json();

    document.getElementById("centro-general").innerText = data.centro.general + " min";
    document.getElementById("centro-ready").innerText = data.centro.ready + " min";
    document.getElementById("centro-sentri").innerText = data.centro.sentri + " min";
    document.getElementById("centro-peaton").innerText = data.centro.peaton + " min";

    document.getElementById("nuevo-general").innerText = data.nuevo.general + " min";
    document.getElementById("nuevo-ready").innerText = data.nuevo.ready + " min";
    document.getElementById("nuevo-sentri").innerText = data.nuevo.sentri + " min";
    document.getElementById("nuevo-peaton").innerText = data.nuevo.peaton + " min";

  }catch(e){
    console.log("Error:", e);
  }
}

window.onload = cargarDatos;

</script>

</body>
</html>
