<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MXLI AHORA</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#0f172a;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

h1{
  text-align:center;
  font-size:32px;
  margin-bottom:5px;
}

.sub{
  text-align:center;
  color:#94a3b8;
  margin-bottom:20px;
}

.card{
  background:#1e293b;
  border-radius:18px;
  padding:16px;
  margin-bottom:15px;
}

.title{
  font-size:20px;
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.row:last-child{
  border:none;
}

.green{color:#22c55e;}
.yellow{color:#facc15;}
.red{color:#ef4444;}
</style>
</head>

<body>

<div class="container">

<h1>📍 MXLI AHORA</h1>
<div class="sub" id="hora">Cargando...</div>

<!-- CENTRO -->
<div class="card">
  <div class="title">📍 Centro</div>

  <div class="row">
    <span>🚗 General</span>
    <span id="centro-general">--</span>
  </div>

  <div class="row">
    <span>🟦 Ready</span>
    <span id="centro-ready">--</span>
  </div>

  <div class="row">
    <span>⚡ Sentri</span>
    <span id="centro-sentri">--</span>
  </div>

  <div class="row">
    <span>🚶 Peatonal</span>
    <span id="centro-peaton">--</span>
  </div>
</div>

<!-- NUEVO -->
<div class="card">
  <div class="title">📍 Nuevo Mexicali</div>

  <div class="row">
    <span>🚗 General</span>
    <span id="nuevo-general">--</span>
  </div>

  <div class="row">
    <span>🟦 Ready</span>
    <span id="nuevo-ready">--</span>
  </div>

  <div class="row">
    <span>⚡ Sentri</span>
    <span id="nuevo-sentri">--</span>
  </div>

  <div class="row">
    <span>🚶 Peatonal</span>
    <span id="nuevo-peaton">--</span>
  </div>
</div>

</div>

<script>
// ⏰ HORA
function actualizarHora(){
  const ahora = new Date();
  document.getElementById("hora").innerText =
    ahora.toLocaleString("es-MX", {
      timeZone:"America/Tijuana",
      weekday:"long",
      hour:"numeric",
      minute:"numeric"
    });
}
setInterval(actualizarHora,1000);
actualizarHora();


// 🎨 COLORES
function color(v){
  if(v <= 15) return "green";
  if(v <= 60) return "yellow";
  return "red";
}


// 🚀 API
async function cargar(){
  try{
    const res = await fetch("https://raspy-sky-1be8.mxliahora.workers.dev");
    const data = await res.json();

    function set(id, val){
      const el = document.getElementById(id);
      el.innerText = val + " min";
      el.className = color(val);
    }

    set("centro-general", data.centro.general);
    set("centro-ready", data.centro.ready);
    set("centro-sentri", data.centro.sentri);
    set("centro-peaton", data.centro.peaton);

    set("nuevo-general", data.nuevo.general);
    set("nuevo-ready", data.nuevo.ready);
    set("nuevo-sentri", data.nuevo.sentri);
    set("nuevo-peaton", data.nuevo.peaton);

  }catch(e){
    console.log(e);
  }
}

cargar();
setInterval(cargar,30000);
</script>

</body>
</html>
