<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MXLI AHORA</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:white;

  background:
    radial-gradient(circle at 20% 20%, #ff3c3c33, transparent 40%),
    radial-gradient(circle at 80% 30%, #4da6ff33, transparent 40%),
    radial-gradient(circle at 50% 80%, #ffcc0033, transparent 40%),
    #0b1020;
}

/* CONTENEDOR */
.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

/* HEADER */
.title{
  text-align:center;
  margin:20px 0;
}

.title h1{
  margin:0;
  font-size:32px;
}

.title p{
  opacity:.6;
}

/* TARJETA VIDRIO */
.card{
  margin-top:25px;
  border-radius:24px;
  padding:16px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 1px rgba(255,255,255,0.1);

  position:relative;
}

/* BORDE GLOW FINO */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  padding:1px;

  background:linear-gradient(120deg,#ff6a00,#6a5cff,#00e0ff);

  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

/* HEADER CARD */
.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.card-header h2{
  margin:0;
  font-size:22px;
}

/* BLOQUE INTERNO */
.inner{
  background:rgba(0,0,0,0.45);
  border-radius:18px;
  overflow:hidden;
}

/* TITULO AUTOS */
.section-title{
  padding:12px 16px;
  font-weight:bold;
  letter-spacing:1px;
  opacity:.9;
}

/* TABLA */
.table{
  display:flex;
  flex-direction:column;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:14px 16px;

  border-top:1px solid rgba(255,255,255,0.06);
}

.row:first-child{
  border-top:none;
}

.label{
  display:flex;
  gap:8px;
  align-items:center;
}

/* COLORES EXACTOS */
.yellow{color:#ffd54f;}
.red{color:#ff5c5c;}
.green{color:#4caf50;}

/* STATUS */
.status{
  margin-top:12px;
  font-size:14px;
  color:#6fff6f;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">
    <h1>📍 MXLI AHORA</h1>
    <p>Garitas Mexicali en tiempo real</p>
  </div>

  <!-- CENTRO -->
  <div class="card">

    <div class="card-header">
      <h2>📍 Centro</h2>
      <span>›</span>
    </div>

    <div class="inner">
      <div class="section-title">AUTOS</div>

      <div class="table">
        <div class="row">
          <div class="label">🚗 General</div>
          <div class="yellow">45 min</div>
        </div>

        <div class="row">
          <div class="label">🟦 Ready</div>
          <div class="red">60 min</div>
        </div>

        <div class="row">
          <div class="label">⚡ Sentri</div>
          <div class="green">5 min</div>
        </div>

        <div class="row">
          <div class="label">🚶 Peatonal</div>
          <div class="green">12 min</div>
        </div>
      </div>
    </div>

    <div class="status">🟢 Información actualizada hace unos minutos</div>

  </div>

</div>

</body>
</html>
