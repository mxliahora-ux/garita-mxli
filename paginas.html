<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Páginas | MXLI AHORA</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07101f;
      color: white;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .logo-img {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 16px;
      background: #ff4d4d;
    }

    .brand {
      font-size: 28px;
      font-weight: 700;
      margin: 0;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #f0a7aa;
      text-decoration: none;
      font-size: 16px;
    }

    .card {
      background: #101a30;
      border: 1px solid #22314d;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 18px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    .card p {
      margin: 0 0 16px;
      color: #c0cadb;
      line-height: 1.5;
    }

    .card a.button {
      display: inline-block;
      background: #19253b;
      border: 1px solid #263553;
      color: #fff;
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back-link" href="index.html">← Regresar</a>

    <div class="topbar">
      <img src="logo.png" alt="Logo Garita MXLI" class="logo-img" />
      <h1 class="brand">Páginas</h1>
    </div>

    <div class="card">
      <h2>Mexicali de Noche</h2>
      <p>Página de Facebook para noticias, contenido y comunidad.</p>
      <a class="button" href="https://www.facebook.com/share/18BTs7nttS/?mibextid=wwXIfr" target="_blank">Abrir página</a>
    </div>

    <div class="card">
      <h2>Facebook Garitas</h2>
      <p>Página de Facebook enfocada en tiempos y reportes de garitas.</p>
      <a class="button" href="https://www.facebook.com/share/1CZLzitZQ3/?mibextid=wwXIfr" target="_blank">Abrir página</a>
    </div>

    <div class="card">
      <h2>CBP</h2>
      <p>Consulta oficial de tiempos de espera.</p>
      <a class="button" href="https://bwt.cbp.gov/ViewAllPorts.html?com=1&pas=1&ped=1&plist=2503" target="_blank">Abrir CBP</a>
    </div>
  </div>
</body>
</html>
