<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MXLI AHORA TEST</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071234;
      color: white;
      padding: 24px;
    }

    .card {
      max-width: 700px;
      margin: 0 auto;
      background: #1c2650;
      border-radius: 20px;
      padding: 24px;
    }

    h1 { margin-top: 0; }
    .box {
      background: #2a356b;
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }
    .red { color: #ff6b6b; }
    .green { color: #7CFC8A; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MXLI AHORA TEST</h1>
    <p>Aquí pruebas sin tocar la principal.</p>

    <div class="box" id="fecha">📅 Cargando...</div>
    <div class="box" id="hora">⏰ Cargando...</div>
    <div class="box" id="clima">🌡️ 29°C</div>

    <div class="box">
      🚗 General: <span id="g" class="red">90 min</span><br>
      ⚡ Sentri: <span id="s" class="green">10 min</span><br>
      🚶 Peatones: <span id="p" class="red">30 min</span>
    </div>

    <div class="box">
      Si esto funciona, luego copiamos solo lo bueno a la principal.
    </div>
  </div>

  <script>
    function cap(texto) {
      return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function actualizar() {
      const ahora = new Date();

      const fecha = new Intl.DateTimeFormat('es-MX', {
        timeZone: 'America/Tijuana',
        weekday: 'long',
        day: 'numeric',
        month: 'long'
      }).format(ahora);

      const hora = new Intl.DateTimeFormat('es-MX', {
        timeZone: 'America/Tijuana',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(ahora);

      document.getElementById('fecha').textContent = '📅 ' + cap(fecha);
      document.getElementById('hora').textContent = '⏰ ' + hora;
    }

    actualizar();
    setInterval(actualizar, 1000);
  </script>
</body>
</html>
