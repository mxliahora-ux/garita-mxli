<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garitas Mexicali</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#e9edf1;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  color:#20242b;
}

.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  background:linear-gradient(180deg,#f8fafc 0%,#e7ebef 100%);
  padding:18px 10px 90px;
}

/* TOP */

.topbar{
  display:grid;
  grid-template-columns:42px 1fr 42px;
  align-items:center;
  margin-bottom:12px;
}

.menu{
  font-size:30px;
  padding-left:5px;
}

.bell{
  text-align:right;
  font-size:24px;
}

.logo{
  text-align:center;
}

.logo .garitas{
  font-size:28px;
  letter-spacing:8px;
  font-weight:900;
}

.logo .mexicali{
  font-size:28px;
  letter-spacing:7px;
  font-weight:900;
  color:#8bb640;
}

.logo .tag{
  margin-top:8px;
  font-size:11px;
  letter-spacing:2px;
  color:#5f6770;
  font-weight:800;
}

/* HERO */

.hero{
  position:relative;
  height:290px;
  border-radius:18px;
  overflow:hidden;
  background:#cfd5dc;
  box-shadow:0 10px 24px rgba(0,0,0,.15);
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.live{
  position:absolute;
  top:14px;
  left:14px;
  background:rgba(37,43,50,.72);
  color:white;
  border-radius:18px;
  padding:8px 12px;
  font-size:12px;
  font-weight:900;
}

.camera{
  position:absolute;
  top:14px;
  right:14px;
  background:rgba(255,255,255,.92);
  border-radius:18px;
  padding:8px 13px;
  font-size:12px;
  font-weight:900;
}

.panel{
  position:absolute;
  left:15px;
  bottom:15px;
  width:155px;
  background:rgba(255,255,255,.95);
  border-radius:18px;
  padding:14px 13px;
  box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.panel h2{
  margin:0 0 6px;
  font-size:17px;
}

.big{
  display:flex;
  align-items:flex-end;
  gap:4px;
}

.big strong{
  font-size:60px;
  line-height:.8;
  font-weight:300;
  letter-spacing:-5px;
}

.big span{
  color:#d9433f;
  font-size:18px;
  font-weight:900;
  padding-bottom:5px;
}

.redpill{
  background:#d9433f;
  color:white;
  border-radius:18px;
  padding:7px 9px;
  font-size:11px;
  font-weight:900;
  margin:10px 0;
}

.panel b{
  display:block;
  font-size:14px;
}

.panel small{
  color:#444;
}

.updated{
  margin-top:10px;
  padding-top:9px;
  border-top:1px solid #d8dde2;
  font-size:11px;
  font-weight:800;
}

/* TITLES */

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:16px 2px 9px;
  font-size:12px;
  font-weight:900;
}

/* GRID */

.grid4{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
}

.card{
  background:linear-gradient(180deg,#ffffff,#f2f4f7);
  border-radius:15px;
  padding:10px 8px;
  border:1px solid #dfe4e9;
  box-shadow:0 8px 16px rgba(0,0,0,.08);
}

.card .title{
  font-size:10px;
  font-weight:900;
}

.card .num{
  margin-top:12px;
  font-size:34px;
  font-weight:300;
  letter-spacing:-2px;
}

.card .num span{
  font-size:13px;
  font-weight:900;
}

.green{
  color:#8bb640;
}

.yellow{
  color:#d99a1b;
}

.red{
  color:#d9433f;
}

.badge{
  display:inline-block;
  color:white;
  border-radius:12px;
  padding:4px 8px;
  font-size:10px;
  font-weight:900;
  margin-top:8px;
}

.badge.green{
  background:#8bb640;
}

.badge.yellow{
  background:#d99a1b;
}

.badge.red{
  background:#d9433f;
}

.note{
  margin-top:8px;
  font-size:10px;
}

/* MINI */

.mini-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-top:9px;
}

.mini{
  background:linear-gradient(180deg,#ffffff,#f2f4f7);
  border-radius:15px;
  padding:11px 9px;
  border:1px solid #dfe4e9;
  box-shadow:0 8px 16px rgba(0,0,0,.08);
}

.mini .top{
  font-size:11px;
  font-weight:900;
}

.mini .value{
  margin-top:12px;
  font-size:30px;
}

.mini .small{
  margin-top:6px;
  font-size:11px;
  color:#444;
}

/* REPORTS */

.reports{
  margin-top:12px;
  background:linear-gradient(180deg,#ffffff,#f2f4f7);
  border-radius:15px;
  padding:13px;
  border:1px solid #dfe4e9;
  box-shadow:0 8px 16px rgba(0,0,0,.08);
}

.reports-top{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  font-weight:900;
  margin-bottom:10px;
}

.report{
  display:grid;
  grid-template-columns:42px 1fr 54px;
  gap:9px;
  padding:8px 0;
  border-bottom:1px solid #dfe4e9;
}

.avatar{
  width:40px;
  height:40px;
  border-radius:50%;
  background:#cbd5e1;
}

.report b{
  font-size:13px;
}

.report p{
  margin:2px 0 0;
  font-size:11px;
}

.like{
  background:#f4f6f8;
  border-radius:16px;
  padding:7px;
  text-align:center;
  color:#8bb640;
  font-weight:900;
}

.send{
  width:100%;
  margin-top:10px;
  border:0;
  border-radius:22px;
  background:#343c45;
  color:white;
  padding:14px;
  font-size:14px;
  font-weight:900;
}

/* AD */

.ad{
  margin-top:12px;
  background:linear-gradient(180deg,#ffffff,#f2f4f7);
  border-radius:15px;
  padding:12px;
  border:1px solid #dfe4e9;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.ad button{
  border:1px solid #555;
  background:white;
  border-radius:10px;
  padding:10px 12px;
  font-size:11px;
  font-weight:900;
}

/* NAV */

.nav{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  max-width:430px;
  width:100%;
  height:72px;
  background:rgba(247,249,251,.96);
  border-top:1px solid #dfe4e9;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  padding:8px 8px 14px;
}

.nav div{
  text-align:center;
  font-size:10px;
  font-weight:900;
  color:#666;
}

.nav .active{
  color:#8bb640;
}

.plus{
  width:52px;
  height:52px;
  border-radius:50%;
  background:#3b434c;
  color:white;
  margin:-20px auto 0;
  display:grid;
  place-items:center;
  font-size:35px;
}

</style>
</head>

<body>

<div class="app">

<header class="topbar">

<div class="menu">☰</div>

<div class="logo">
<div class="garitas">GARITAS</div>
<div class="mexicali">MEXICALI</div>
<div class="tag">AQUÍ SÍ VES LA FRONTERA REAL</div>
</div>

<div class="bell">🔔</div>

</header>

<section class="hero">

<img src="https://www.crucedirecto.com/a-cd/baja-california/mexicali/centro/PeatonalA/imagen-actual.jpg">

<div class="live">🟢 EN VIVO</div>

<div class="camera">📷 CÁMARA CENTRO</div>

<div class="panel">

<h2>CENTRO 🚶</h2>

<div class="big">
<strong>120</strong>
<span>MIN</span>
</div>

<div class="redpill">
🚶 PEATONAL Y VEHICULAR
</div>

<b>Tráfico pesado</b>

<small>Todos los carriles</small>

<div class="updated">
⏱ Actualizado hace 2 min
</div>

</div>

</section>
