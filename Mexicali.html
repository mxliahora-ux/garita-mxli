<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mexi-Cali</title>

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
}

.hero img{
  width:100%;
  display:block;
}

.section{
  padding:35px 20px 45px;
  background:#050505;
}

.links{
  display:flex;
  justify-content:center;
  gap:45px;
  flex-wrap:wrap;
  margin-bottom:35px;
}

.links a{
  color:white;
  text-decoration:none;
  font-size:22px;
  font-weight:800;
  letter-spacing:5px;
  text-transform:uppercase;
  padding-bottom:10px;
  border-bottom:2px solid #ff2d9a;
}

.stats{
  display:flex;
  justify-content:center;
  gap:60px;
  flex-wrap:wrap;
  margin-top:25px;
}

.stat{
  font-size:14px;
  letter-spacing:3px;
  color:#bbb;
}

.stat b{
  display:block;
  font-size:34px;
  color:white;
  margin-bottom:5px;
}

.footer{
  margin-top:35px;
  font-size:13px;
  letter-spacing:4px;
  color:#aaa;
}

@media(max-width:700px){
  .links{
    flex-direction:column;
    gap:25px;
  }

  .links a{
    font-size:20px;
  }
}
</style>
</head>

<body>

<section class="hero">
  <img src="hero.jpg" alt="Mexi-Cali">
</section>

<section class="section">

  <div class="links">
    <a href="https://www.facebook.com/share/18bTfeCp7C/?mibextid=wwXIfr">GARITA MXLI</a>

    <div class="stat">👁️ <b>12,483</b> VISITANTES</div>
    <div class="stat">🟢 <b>148</b> VIENDO AHORA</div>
  </div>

  <div class="footer">
    MEXI-CALI.COM
  </div>

</section>

</html>
