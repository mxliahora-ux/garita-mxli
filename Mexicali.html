<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mexi-Cali</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:white;
  font-family:Arial, sans-serif;
  overflow-x:hidden;
}

.hero img{
  width:100%;
  display:block;
}

.section{
  background:#000;
  padding:40px 25px 60px;
  text-align:center;
}

.links{
  display:flex;
  flex-direction:column;
  gap:35px;
}

.links a{
  color:white;
  text-decoration:none;
  font-size:24px;
  font-weight:800;
  letter-spacing:7px;
  text-transform:uppercase;
  padding-bottom:14px;
  border-bottom:2px solid #ff2d9a;
  transition:0.3s;
}

.links a:hover{
  color:#ff2d9a;
  transform:scale(1.03);
}

.stats{
  margin-top:55px;
  display:flex;
  justify-content:center;
  gap:70px;
  flex-wrap:wrap;
}

.stat{
  text-align:center;
}

.stat b{
  display:block;
  font-size:58px;
  margin-top:10px;
}

.stat span{
  display:block;
  margin-top:8px;
  color:#aaa;
  letter-spacing:5px;
  font-size:13px;
}

.footer{
  margin-top:55px;
  color:#666;
  letter-spacing:6px;
  font-size:12px;
}

@media(max-width:700px){

  .links a{
    font-size:20px;
    letter-spacing:5px;
  }

  .stat b{
    font-size:44px;
  }

}

</style>
</head>

<body>

<section class="hero">
  <img src="hero.jpg" alt="Mexi-Cali">
</section>

<section class="section">

  <div class="links">

    <a href="https://www.facebook.com/share/18bTfeCp7C/?mibextid=wwXIfr">
      GARITA MXLI
    </a>

    <a href="https://www.facebook.com/share/1As4KH1y48/?mibextid=wwXIfr">
      MEXICALI DE NOCHE
    </a>

  </div>

  <div class="stats">

    <div class="stat">
      👁️
      <b id="visitantes">12,483</b>
      <span>VISITANTES</span>
    </div>

    <div class="stat">
      🟢
      <b id="online">148</b>
      <span>VIENDO AHORA</span>
    </div>

  </div>

  <div class="footer">
    MEXI-CALI.COM
  </div>

</section>

<script>

let visitantes = 12483;
let online = 148;

setInterval(() => {

  visitantes += Math.floor(Math.random() * 3);

  online = 120 + Math.floor(Math.random() * 80);

  document.getElementById("visitantes").innerText =
    visitantes.toLocaleString();

  document.getElementById("online").innerText =
    online;

}, 4000);

</script>

</body>
</html>
