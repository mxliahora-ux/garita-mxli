<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mexi-Cali</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
}

.hero img{
    width:100%;
    display:block;
}

.content{
    padding:40px 30px 60px;
    text-align:center;
}

.links{
    margin-top:10px;
}

.links a{
    display:block;
    text-decoration:none;
    color:white;
    font-size:24px;
    font-weight:800;
    letter-spacing:8px;
    margin:35px 0;
    padding-bottom:14px;
    border-bottom:2px solid #ff2d9a;
}

.stats{
    display:flex;
    justify-content:center;
    gap:60px;
    margin-top:50px;
    flex-wrap:wrap;
}

.stat{
    text-align:center;
}

.icon{
    font-size:30px;
    margin-bottom:10px;
}

.number{
    font-size:58px;
    font-weight:900;
}

.label{
    margin-top:10px;
    color:#999;
    font-size:14px;
    letter-spacing:5px;
}

.footer{
    margin-top:55px;
    color:#666;
    font-size:12px;
    letter-spacing:6px;
}

@media(max-width:700px){

    .links a{
        font-size:20px;
        letter-spacing:5px;
    }

    .number{
        font-size:48px;
    }

}

</style>
</head>

<body>

<div class="hero">
    <img src="hero.jpg">
</div>

<div class="content">

    <div class="links">

        <a href="https://www.facebook.com/share/18bTfeCp7C/?mibextid=wwXIfr">
            GARITA MXLI
        </a>

        <a href="https://www.facebook.com/share/1As4KH1y48/?mibextid=wwXIfr">
            MEXICALI DE NOCHE
        </a>

    </div>

    <div class="stats">

        <div class="stat">
            <div class="icon">👁️</div>
            <div class="number" id="visitantes">12,483</div>
            <div class="label">VISITANTES</div>
        </div>

        <div class="stat">
            <div class="icon">🟢</div>
            <div class="number" id="online">148</div>
            <div class="label">VIENDO AHORA</div>
        </div>

    </div>

    <div class="footer">
        MEXI-CALI.COM
    </div>

</div>

<script>

let visitantes = 12483;
let online = 148;

setInterval(() => {

    visitantes += Math.floor(Math.random() * 2);

    online = 130 + Math.floor(Math.random() * 50);

    document.getElementById("visitantes").innerText =
        visitantes.toLocaleString();

    document.getElementById("online").innerText =
        online;

}, 4000);

</script>

</body>
</html>
