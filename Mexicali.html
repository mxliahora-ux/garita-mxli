<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mexi-Cali</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

/* HERO */

.hero img{
    width:100%;
    display:block;
}

/* CONTENT */

.content{
    background:#000;
    padding:40px 25px 70px;
    text-align:center;
}

/* LINKS */

.links{
    display:flex;
    flex-direction:column;
    gap:38px;
}

.links a{
    text-decoration:none;
    color:white;
    font-size:24px;
    font-weight:800;
    letter-spacing:8px;
    text-transform:uppercase;
    padding-bottom:14px;
    border-bottom:2px solid #ff2d9a;
    transition:.3s;
}

.links a:hover{
    color:#ff2d9a;
}

/* STATS */

.stats{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:70px;
    margin-top:55px;
    flex-wrap:nowrap;
}

.stat{
    text-align:center;
}

.icon{
    font-size:28px;
    margin-bottom:10px;
}

.number{
    font-size:38px;
    font-weight:800;
    color:white;

}

.label{
    margin-top:10px;
    color:#999;
    font-size:13px;
    letter-spacing:5px;
}

/* MOBILE */

@media(max-width:700px){

    .links a{
        font-size:20px;
        letter-spacing:5px;
    }

    .stats{
        gap:45px;
    }

    .number{
        font-size:46px;
    }

    .label{
        font-size:11px;
        letter-spacing:4px;
    }

}

</style>
</head>

<body>

<!-- HERO IMAGE -->

<section class="hero">
    <img src="hero.jpg" alt="Mexi-Cali">
</section>

<!-- CONTENT -->

<section class="content">

    <!-- LINKS -->

    <div class="links">

        <a href="https://www.facebook.com/share/18bTfeCp7C/?mibextid=wwXIfr">
            GARITA MXLI
        </a>

        <a href="https://www.facebook.com/share/1As4KH1y48/?mibextid=wwXIfr">
            MEXICALI DE NOCHE
        </a>

    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat">
            <div class="icon">👁️</div>
            <div class="number" id="visitantes">12,483</div>
            <div class="label">VISITANTES</div>
        </div>

        <div class="stat">
            <div class="icon">🟢</div>
            <div class="number" id="online">148</div>
            <div class="label">VIENDO AHORA</div>
        </div>

    </div>

</section>

<!-- AUTO NUMBERS -->

<script>

let visitantes = 12483;
let online = 148;

setInterval(() => {

    visitantes += Math.floor(Math.random() * 2);

    online = 130 + Math.floor(Math.random() * 50);

    document.getElementById("visitantes").innerText =
        visitantes.toLocaleString();

    document.getElementById("online").innerText =
        online;

}, 4000);

</script>

</body>
</html>
