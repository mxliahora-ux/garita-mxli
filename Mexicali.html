<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mexi-Cali</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
    overflow-x:hidden;
}

/* HERO IMAGE */

.hero img{
    width:100%;
    display:block;
}

/* CONTENT */

.content{
    padding:35px 25px 60px;
    text-align:center;
    background:#050505;
}

/* LINKS */

.links{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
    margin-bottom:45px;
}

.links a{
    text-decoration:none;
    color:white;
    font-size:22px;
    font-weight:800;
    letter-spacing:6px;
    text-transform:uppercase;
    border-bottom:2px solid #ff2d9a;
    padding-bottom:10px;
    transition:.3s;
}

.links a:hover{
    color:#ff2d9a;
}

/* STATS */

.stats{
    display:flex;
    justify-content:center;
    gap:60px;
    flex-wrap:wrap;
    margin-top:20px;
}

.stat{
    display:flex;
    align-items:center;
    gap:14px;
    color:#ccc;
    font-size:14px;
    letter-spacing:3px;
}

.number{
    font-size:34px;
    font-weight:900;
    color:white;
}

/* MOBILE */

@media(max-width:700px){

    .links{
        flex-direction:column;
        gap:25px;
    }

    .links a{
        font-size:20px;
    }

    .stats{
        flex-direction:column;
        gap:20px;
    }

}

</style>
</head>

<body>

<!-- HERO -->

<section class="hero">
    <img src="hero.jpg" alt="Mexi-Cali">
</section>

<!-- CONTENT -->

<section class="content">

    <!-- LINKS -->

    <div class="links">

        <a href="https://www.facebook.com/share/18bTfeCp7C/?mibextid=wwXIfr">
            GARITA MXLI
        </a>

        <a href="https://www.facebook.com/share/1As4KH1y48/?mibextid=wwXIfr">
            MEXICALI DE NOCHE
        </a>

    </div>

    <!-- STATS -->

    <div class="stats">

        <div class="stat">
            👁️
            <span class="number" id="visitantes">12,483</span>
            VISITANTES
        </div>

        <div class="stat">
            🟢
            <span class="number" id="online">148</span>
            VIENDO AHORA
        </div>

    </div>

</section>

<!-- SCRIPT -->

<script>

let visitantes = 12483;
let online = 148;

setInterval(() => {

    visitantes += Math.floor(Math.random() * 2);

    online = 130 + Math.floor(Math.random() * 50);

    document.getElementById("visitantes").innerText =
        visitantes.toLocaleString();

    document.getElementById("online").innerText =
        online;

}, 4000);

</script>

</body>
</html>
