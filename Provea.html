<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MXLI AHORA TEST REAL</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071234;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 760px;
      margin: auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .logo {
      width: 50px;
      height: 50px;
      border-radius: 12px;
      object-fit: cover;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
    }

    .menu {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    .menu a {
      text-decoration: none;
    }

    .menu button {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #1e293b;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .box {
      background: #2a356b;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
    }

    .big-box {
      background: #1c2650;
      border-radius: 22px;
      padding: 20px;
      margin-top: 16px;
    }

    .section-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .row {
      margin: 10px 0;
      font-size: 22px;
    }

    .red { color: #ff8a8a; }
    .green { color: #9fff9f; }

    .subinfo {
      margin-top: 14px;
      font-size: 16px;
      opacity: 0.9;
    }

    .status-ok { color: #9fff9f; }
    .status-warn { color: #ffd37a; }
    .status-bad { color: #ff9b9b; }

    .debug {
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 12px;
      line-height: 1.45;
      opacity: 0.9;
      max-height: 260px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <img src="logo.png" class="logo" alt="Logo MXLI AHORA">
      <h1>TEST REAL CBP</h1>
    </div>

    <div class="menu">
      <a href="index.html"><button>🏠 Inicio</button></a>
      <a href="camaras.html"><button>📷 Cámaras</button></a>
      <a href="paginas.html"><button>🌐 Páginas</button></a>
    </div>

    <div class="box" id="fechaBox">📅 Cargando...</div>
    <div class="box" id="horaBox">⏰ Cargando...</div>
    <div class="box" id="estadoBox">Estado: probando conexión…</div>

    <div class="big-box">
      <div class="section-title">🚨 GARITA MXLI - Centro (Calexico West)</div>

      <div class="row">🚗 General: <span id="general" class="red">--</span></div>
      <div class="row">⚡ Ready Lane: <span id="ready" class="green">--</span></div>
      <div class="row">⚡ Sentri: <span id="sentri" class="green">--</span></div>
      <div class="row">🚶 Peatones: <span id="peatones" class="red">--</span></div>
      <div class="row">⚡ Sentri peatones: <span id="peatonesReady" class="green">--</span></div>

      <div class="subinfo" id="actualizado">Actualizado hace unos segundos</div>
    </div>

    <div class="box">
      <div style="font-size:18px; font-weight:bold; margin-bottom:8px;">Debug</div>
      <div id="debugBox" class="debug">Esperando prueba…</div>
    </div>

  </div>

  <script>
    let ultimaActualizacion = new Date();

    const estadoBox = document.getElementById('estadoBox');
    const debugBox = document.getElementById('debugBox');

    function capitalizar(texto) {
      return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function actualizarFechaHora() {
      const ahora = new Date();

      const fecha = new Intl.DateTimeFormat('es-MX', {
        timeZone: 'America/Tijuana',
        weekday: 'long',
        day: 'numeric',
        month: 'long'
      }).format(ahora);

      const hora = new Intl.DateTimeFormat('es-MX', {
        timeZone: 'America/Tijuana',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(ahora);

      document.getElementById('fechaBox').textContent = '📅 ' + capitalizar(fecha);
      document.getElementById('horaBox').textContent = '⏰ ' + hora;
    }

    function actualizarTextoTiempo() {
      const ahora = new Date();
      const segundos = Math.floor((ahora - ultimaActualizacion) / 1000);

      let texto = '';
      if (segundos < 60) {
        texto = 'Actualizado hace unos segundos';
      } else {
        texto = 'Actualizado hace ' + Math.floor(segundos / 60) + ' min';
      }
      document.getElementById('actualizado').textContent = texto;
    }

    function setFallback(msg) {
      document.getElementById('general').textContent = '--';
      document.getElementById('ready').textContent = '--';
      document.getElementById('sentri').textContent = '--';
      document.getElementById('peatones').textContent = '--';
      document.getElementById('peatonesReady').textContent = '--';
      estadoBox.innerHTML = 'Estado: <span class="status-bad">' + msg + '</span>';
    }

    function cleanText(html) {
      return html
        .replace(/<script[\s\S]*?<\/script>/gi, ' ')
        .replace(/<style[\s\S]*?<\/style>/gi, ' ')
        .replace(/<[^>]+>/g, ' ')
        .replace(/&nbsp;/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function findWestBlock(text) {
      const patterns = [
        /Calexico\s+West([\s\S]{0,2200})Calexico\s+East/i,
        /Calexico\s+West([\s\S]{0,2200})Los\s+Algodones/i,
        /Calexico\s+West([\s\S]{0,2200})Andrade/i,
        /Calexico\s+West([\s\S]{0,2200})$/i
      ];

      for (const p of patterns) {
        const m = text.match(p);
        if (m) return m[0];
      }
      return null;
    }

    function pickMinutes(block, labels) {
      for (const label of labels) {
        const re1 = new RegExp(label + '\\s*(?:Lanes?)?\\s*:?\\s*(?:At[^\\d]{0,50})?(\\d+)\\s*(?:min|minutes)', 'i');
        const m1 = block.match(re1);
        if (m1) return m1[1] + ' min';

        const re2 = new RegExp(label + '[\\s\\S]{0,80}?(\\d+)\\s*(?:min|minutes)', 'i');
        const m2 = block.match(re2);
        if (m2) return m2[1] + ' min';

        const re3 = new RegExp(label + '[\\s\\S]{0,80}?(no delay|n\\/a)', 'i');
        const m3 = block.match(re3);
        if (m3) return m3[1].toLowerCase() === 'no delay' ? '0 min' : 'N/D';
      }
      return '--';
    }

    async function cargarCentroReal() {
      const sourceUrl = 'https://bwt.cbp.gov/ViewAllPorts.html?com=1&pas=1&ped=1&plist=2503';
      const proxyUrls = [
        'https://r.jina.ai/http://bwt.cbp.gov/ViewAllPorts.html?com=1&pas=1&ped=1&plist=2503',
        'https://api.allorigins.win/raw?url=' + encodeURIComponent(sourceUrl),
        'https://api.allorigins.win/get?url=' + encodeURIComponent(sourceUrl)
      ];

      estadoBox.innerHTML = 'Estado: <span class="status-warn">probando conexión…</span>';

      try {
        let rawHtml = '';
        let usedUrl = '';

        for (const url of proxyUrls) {
          try {
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) continue;

            const text = await res.text();

            if (url.includes('/get?url=')) {
              const json = JSON.parse(text);
              rawHtml = json.contents || '';
            } else {
              rawHtml = text;
            }

            if (rawHtml && /Calexico\s+West/i.test(rawHtml)) {
              usedUrl = url;
              break;
            }
          } catch (e) {}
        }

        if (!rawHtml) {
          throw new Error('No se pudo descargar nada del origen/proxy.');
        }

        const text = cleanText(rawHtml);
        const westBlock = findWestBlock(text);

        if (!westBlock) {
          debugBox.textContent =
            'No encontré bloque Calexico West.\n\nFuente usada:\n' +
            (usedUrl || 'ninguna') +
            '\n\nPrimeros 1200 caracteres:\n' +
            text.slice(0, 1200);
          throw new Error('No encontré Calexico West en el texto.');
        }

        const general = pickMinutes(westBlock, ['General', 'Normal']);
        const ready = pickMinutes(westBlock, ['Ready Lane', 'Ready']);
        const sentri = pickMinutes(westBlock, ['Sentri']);
        const peatones = pickMinutes(westBlock, ['Pedestrian General', 'Peatones General', 'Pedestrian', 'Peatones']);
        const peatonesReady = pickMinutes(westBlock, ['Pedestrian Ready Lane', 'Peatones Ready Lane', 'Pedestrian Ready', 'Peatones Ready']);

        document.getElementById('general').textContent = general;
        document.getElementById('ready').textContent = ready;
        document.getElementById('sentri').textContent = sentri;
        document.getElementById('peatones').textContent = peatones;
        document.getElementById('peatonesReady').textContent = peatonesReady;

        ultimaActualizacion = new Date();
        actualizarTextoTiempo();

        estadoBox.innerHTML = 'Estado: <span class="status-ok">leyendo datos reales</span>';

        debugBox.textContent =
          'Fuente usada:\n' + (usedUrl || 'ninguna') +
          '\n\nBloque detectado Calexico West:\n\n' +
          westBlock.slice(0, 1800);
      } catch (e) {
        setFallback('falló lectura real');
        debugBox.textContent = 'Error:\n' + e.message;
      }
    }

    actualizarFechaHora();
    actualizarTextoTiempo();
    cargarCentroReal();

    setInterval(actualizarFechaHora, 1000);
    setInterval(actualizarTextoTiempo, 1000);
    setInterval(cargarCentroReal, 300000);
  </script>
</body>
</html>
