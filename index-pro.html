<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MXLI AHORA</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #071234;
  color: white;
  padding: 20px;
}

.card {
  background: #1c2650;
  border-radius: 20px;
  padding: 18px;
  margin-bottom: 14px;
}

.title {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 10px;
}

.row {
  margin-bottom: 6px;
  font-size: 18px;
}

.value {
  color: #ffd84d;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
  <div class="title">🚗 Centro (Calexico West)</div>
  <div id="centro">Cargando...</div>
</div>

<div class="card">
  <div class="title">🚗 Nuevo Mexicali (Calexico East)</div>
  <div id="nuevo">Cargando...</div>
</div>

<script>
async function cargarGaritas() {
  try {
    const proxy = "https://api.allorigins.win/raw?url=";
    const url = "https://bwt.cbp.gov/bwt.xml";

    const res = await fetch(proxy + encodeURIComponent(url));
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const items = xml.getElementsByTagName("item");

    let centroHTML = "";
    let nuevoHTML = "";

    for (let item of items) {
      const title = item.getElementsByTagName("title")[0]?.textContent || "";
      const desc = item.getElementsByTagName("description")[0]?.textContent || "";

      const general = desc.match(/General Lanes:.*?(\d+ min)/);
      const sentri = desc.match(/Sentri Lanes:.*?(\d+ min)/);
      const ready = desc.match(/Ready Lanes:.*?(\d+ min)/);

      if (title.includes("Calexico - West")) {
        centroHTML = `
          <div class="row">General: <span class="value">${general ? general[1] : "-"}</span></div>
          <div class="row">Sentri: <span class="value">${sentri ? sentri[1] : "-"}</span></div>
          <div class="row">Ready: <span class="value">${ready ? ready[1] : "-"}</span></div>
        `;
      }

      if (title.includes("Calexico - East")) {
        nuevoHTML = `
          <div class="row">General: <span class="value">${general ? general[1] : "-"}</span></div>
          <div class="row">Sentri: <span class="value">${sentri ? sentri[1] : "-"}</span></div>
          <div class="row">Ready: <span class="value">${ready ? ready[1] : "-"}</span></div>
        `;
      }
    }

    document.getElementById("centro").innerHTML = centroHTML || "No disponible";
    document.getElementById("nuevo").innerHTML = nuevoHTML || "No disponible";

  } catch (e) {
    document.getElementById("centro").innerHTML = "❌ Error cargando datos";
    document.getElementById("nuevo").innerHTML = "❌ Error cargando datos";
  }
}

cargarGaritas();
</script>

</body>
</html>
