<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prueba Garitas Automática</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071234;
      color: white;
      padding: 18px;
    }

    .card {
      background: #1c2650;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
    }

    h2 {
      margin-top: 0;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .row {
      margin-bottom: 6px;
      font-size: 18px;
    }

    .value {
      color: #ffd84d;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">🚗 Centro (Calexico West)</div>
    <div id="centro">Cargando...</div>
  </div>

  <div class="card">
    <div class="title">🚗 Nuevo Mexicali (Calexico East)</div>
    <div id="nuevo">Cargando...</div>
  </div>

  <script>
    async function cargarGaritas() {
      try {
        const [westRes, eastRes] = await Promise.all([
          fetch("https://bwt.cbp.gov/bwt.xml?port=calexico-west"),
          fetch("https://bwt.cbp.gov/bwt.xml?port=calexico-east")
        ]);

        const [westText, eastText] = await Promise.all([
          westRes.text(),
          eastRes.text()
        ]);

        function sacarDatos(xmlText, tituloEsperado) {
          const parser = new DOMParser();
          const xml = parser.parseFromString(xmlText, "text/xml");
          const items = xml.getElementsByTagName("item");

          for (let item of items) {
            const title = item.getElementsByTagName("title")[0]?.textContent || "";
            const desc = item.getElementsByTagName("description")[0]?.textContent || "";

            if (title.includes(tituloEsperado)) {
              const general = desc.match(/General Lanes:.*?(\d+ min)/);
              const sentri = desc.match(/Sentri Lanes:.*?(\d+ min)/);
              const ready = desc.match(/Ready Lanes:.*?(\d+ min)/);

              return {
                general: general ? general[1] : "-",
                sentri: sentri ? sentri[1] : "-",
                ready: ready ? ready[1] : "-"
              };
            }
          }

          return null;
        }

        const centro = sacarDatos(westText, "Calexico - West");
        const nuevo = sacarDatos(eastText, "Calexico - East");

        document.getElementById("centro").innerHTML = centro ? `
          <div class="row">General: <span class="value">${centro.general}</span></div>
          <div class="row">Sentri: <span class="value">${centro.sentri}</span></div>
          <div class="row">Ready: <span class="value">${centro.ready}</span></div>
        ` : "No se encontraron datos";

        document.getElementById("nuevo").innerHTML = nuevo ? `
          <div class="row">General: <span class="value">${nuevo.general}</span></div>
          <div class="row">Sentri: <span class="value">${nuevo.sentri}</span></div>
          <div class="row">Ready: <span class="value">${nuevo.ready}</span></div>
        ` : "No se encontraron datos";

      } catch (e) {
        document.getElementById("centro").textContent = "Error cargando datos";
        document.getElementById("nuevo").textContent = "Error cargando datos";
      }
    }

    cargarGaritas();
  </script>

</body>
</html>
