<style>
  body {
    margin: 0;
    padding: 20px;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #08122b 0%, #0d1838 100%);
    color: white;
  }

  .garita-card {
    width: 100%;
    max-width: 720px;
    margin: 0 auto 24px auto;
    border-radius: 28px;
    padding: 22px;
    background: linear-gradient(180deg, rgba(32,42,74,0.96), rgba(20,27,49,0.96));
    border: 1px solid rgba(120, 180, 255, 0.18);
    box-shadow: 0 14px 40px rgba(0,0,0,0.45);
  }

  .garita-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }

  .garita-header .pin {
    font-size: 28px;
  }

  .garita-header h2 {
    margin: 0;
    font-size: 34px;
    font-weight: 800;
    color: #f4cf4d;
    letter-spacing: -0.5px;
  }

  .section-box {
    background: rgba(9, 13, 26, 0.42);
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
  }

  .section-title {
    padding: 18px 20px 12px;
    font-size: 24px;
    font-weight: 800;
    color: white;
    letter-spacing: 1px;
  }

  .table {
    width: 100%;
    border-collapse: collapse;
  }

  .table th,
  .table td {
    padding: 16px 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
    font-size: 19px;
  }

  .table th {
    color: #c9d3ea;
    font-weight: 700;
    text-align: left;
  }

  .table td {
    color: white;
    font-weight: 600;
  }

  .line-name {
    color: #89bfff;
    font-weight: 800;
  }

  .time-fast {
    color: #78e06e;
    font-weight: 800;
  }

  .time-mid {
    color: #f4cf4d;
    font-weight: 800;
  }

  .time-slow {
    color: #ff5d6c;
    font-weight: 800;
  }

  .update-note {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 18px;
    color: #98f5a7;
    font-size: 18px;
  }

  .muted {
    color: #c9d3ea;
  }

  @media (max-width: 640px) {
    body {
      padding: 14px;
    }

    .garita-card {
      padding: 16px;
      border-radius: 22px;
    }

    .garita-header h2 {
      font-size: 28px;
    }

    .section-title {
      font-size: 21px;
    }

    .table th,
    .table td {
      padding: 13px 12px;
      font-size: 17px;
    }
  }
</style>

<div class="garita-card">
  <div class="garita-header">
    <div class="pin">📍</div>
    <h2>Centro</h2>
  </div>

  <div class="section-box">
    <div class="section-title">AUTOS</div>
    <table class="table">
      <tr>
        <th>Línea</th>
        <th>Espera</th>
        <th>Puertas</th>
      </tr>
      <tr>
        <td class="line-name">🚗 General</td>
        <td class="time-mid">${centro.general} min</td>
        <td class="muted">1</td>
      </tr>
      <tr>
        <td class="line-name">🟦 Ready</td>
        <td class="time-slow">${centro.ready} min</td>
        <td class="muted">N/D</td>
      </tr>
      <tr>
        <td class="line-name">⚡ Sentri</td>
        <td class="time-fast">${centro.sentri} min</td>
        <td class="muted">N/D</td>
      </tr>
    </table>

    <div class="section-title">PEATONES</div>
    <table class="table">
      <tr>
        <th>Línea</th>
        <th>Espera</th>
        <th>Puertas</th>
      </tr>
      <tr>
        <td class="line-name">🚶 General</td>
        <td class="time-fast">${centro.peaton} min</td>
        <td class="muted">N/D</td>
      </tr>
      <tr>
        <td class="line-name">🚶 Ready</td>
        <td class="muted">N/D</td>
        <td class="muted">N/D</td>
      </tr>
    </table>
  </div>

  <div class="update-note">
    <span>🟢</span>
    <span>Información actualizada hace unos minutos</span>
  </div>
</div>
