<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Southbank Jeep</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f3f3f3;
color:#111;
}

.hero{
height:100vh;
background:url('jeep.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
position:relative;
text-align:center;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
}

.content{
position:relative;
z-index:2;
color:white;
}

.content h1{
font-size:60px;
margin-bottom:10px;
}

.content p{
font-size:22px;
margin-bottom:30px;
}

.btn{
padding:14px 28px;
background:white;
color:black;
text-decoration:none;
border-radius:40px;
font-weight:bold;
margin:10px;
display:inline-block;
}

.section{
padding:60px 20px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card img{
width:100%;
display:block;
}

.info{
padding:30px;
}

.info h2{
font-size:40px;
margin-bottom:20px;
}

.features{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.feature{
background:#eee;
padding:10px 18px;
border-radius:30px;
}

footer{
text-align:center;
padding:30px;
font-weight:bold;
color:#666;
}

</style>
</head>

<body>

<section class="hero">

<div class="overlay"></div>

<div class="content">
<h1>2026 Jeep Wrangler Rubicon</h1>
<p>Adventure Starts Here</p>

<a href="#" class="btn">Watch Video</a>
<a href="#" class="btn">View Inventory</a>
</div>

</section>

<section class="section">

<div class="card">

<img src="jeep.jpg" alt="Jeep">

<div class="info">

<h2>$268 / Week</h2>

<div class="features">
<div class="feature">4X4</div>
<div class="feature">Navigation</div>
<div class="feature">Automatic</div>
<div class="feature">Heated Seats</div>
</div>

</div>

</div>

</section>

<footer>
W CREATIVE
</footer>

</body>
</html>
