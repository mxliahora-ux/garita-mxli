<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MXLI AHORA</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1a3a;
  color:white;
}

.header{
  padding:15px;
  font-size:22px;
  font-weight:bold;
}

.card{
  background:#0f2147;
  margin:15px;
  border-radius:20px;
  padding:15px;
}

.flyer{
  background:#13265c;
  border-radius:20px;
  padding:15px;
  margin-top:10px;
}

.title{
  background:#ff3b3b;
  padding:10px;
  border-radius:10px;
  text-align:center;
  font-weight:bold;
  font-size:18px;
}

.centro{
  text-align:center;
  font-size:24px;
  font-weight:bold;
  margin-top:10px;
}

.section{
  margin-top:10px;
  padding:10px;
  background:#1e2b50;
  border-radius:10px;
}

.big{
  font-size:20px;
  font-weight:bold;
}

.fechaHora{
  text-align:center;
  margin-top:15px;
  font-size:14px;
  opacity:0.9;
}
</style>

</head>

<body>

<div class="header">🚨 MXLI AHORA</div>

<div class="card">

<h2>Garitas Mexicali en vivo</h2>
<p>Información en tiempo real</p>

<div class="flyer">

<div class="title">🚨 GARITA MXLI</div>

<div class="centro">📍 Centro</div>

<div class="section">
🚗 AUTOS<br>
General — <span id="g" class="big">--</span><br>
Sentri — <span id="s" class="big">--</span>
</div>

<div class="section">
🚶 PEATONES<br>
General — <span id="p" class="big">--</span>
</div>

<div id="fechaHora" class="fechaHora"></div>

</div>

</div>

<script>

function actualizarFechaHora(){
  const ahora = new Date();

  const fecha = new Intl.DateTimeFormat('es-MX',{
    weekday:'long',
    day:'numeric',
    month:'long'
  }).format(ahora);

  const hora = new Intl.DateTimeFormat('es-MX',{
    hour:'numeric',
    minute:'2-digit'
  }).format(ahora);

  document.getElementById("fechaHora").textContent =
    fecha + " • " + hora;
}

async function tiempos(){
  try{
    const r = await fetch("https://bwt.cbp.gov/api/bwt/rss/rssbyportnum/HTML/ALL/250302");
    const t = await r.text();

    const p1 = t.match(/Passenger Vehicles([\s\S]*?)Pedestrian/)[1];
    const p2 = t.match(/Pedestrian([\s\S]*)/)[1];

    const general = p1.match(/General Lanes.*?(\d+)/);
    const sentri = p1.match(/Sentri Lanes.*?(\d+)/);
    const peatones = p2.match(/General Lanes.*?(\d+)/);

    document.getElementById("g").textContent = general ? general[1]+" min" : "--";
    document.getElementById("s").textContent = sentri ? sentri[1]+" min" : "--";
    document.getElementById("p").textContent = peatones ? peatones[1]+" min" : "--";

  }catch(e){
    console.log(e);
  }
}

actualizarFechaHora();
tiempos();

setInterval(actualizarFechaHora,1000);
setInterval(tiempos,300000);

</script>

</body>
</html>
