<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MXLI AHORA</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071234;
      color: white;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 15px;
    }

    .box {
      background: #1c2650;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 15px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
      text-decoration: none;
      box-sizing: border-box;
      font-size: 18px;
    }

    .red {
      background: #f04f45;
      color: white;
    }

    .dark {
      background: #1e293b;
      color: white;
    }
  </style>
</head>
<body>

  <div class="container">

    <h1>MXLI AHORA</h1>

    <!-- FOTO PRINCIPAL -->
    <div class="box" style="position: relative; padding: 10px;">
      <img src="reporte.jpg?v=5" style="width: 100%; border-radius: 18px; display: block;" alt="Reporte">

      <!-- LOGO + TEXTO -->
      <div style="
        position: absolute;
        bottom: 18px;
        left: 18px;
        display: flex;
        align-items: center;
        background: rgba(0,0,0,0.65);
        padding: 6px 10px;
        border-radius: 12px;
      ">
        <img src="logo.png" style="width: 28px; height: 28px; border-radius: 50%; margin-right: 6px;" alt="Logo">
        <span style="font-size: 13px; font-weight: bold;">Reporte con Sofía</span>
      </div>
    </div>

    <!-- FECHA -->
    <div class="box" id="fechaBox">📅 Cargando...</div>

    <!-- HORA -->
    <div class="box" id="horaBox">⏰ Cargando...</div>

    <!-- CLIMA -->
    <div class="box">🌡️ 29°C</div>

    <!-- BOTONES -->
    <a href="https://bwt.cbp.gov/ViewAllPorts.html?com=1&pas=1&ped=1&plist=2503" target="_blank" class="btn red">
      Ver tiempos oficiales
    </a>

    <a href="camaras.html" class="btn dark">
      Ver cámaras en vivo
    </a>

  </div>

  <script>
    function capitalizar(texto) {
      return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function actualizarFechaHora() {
      const ahora = new Date();

      const fecha = new Intl.DateTimeFormat('es-MX', {
        timeZone: 'America/Tijuana',
        weekday: 'long',
        day: 'numeric',
        month: 'long'
      }).format(ahora);

      const hora = new Intl.DateTimeFormat('es-MX', {
        timeZone: 'America/Tijuana',
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(ahora);

      document.getElementById('fechaBox').textContent = '📅 ' + capitalizar(fecha);
      document.getElementById('horaBox').textContent = '⏰ ' + hora;
    }

    actualizarFechaHora();
    setInterval(actualizarFechaHora, 1000);
  </script>

</body>
</html>
