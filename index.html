<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MXLI AHORA</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071234;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
    }

    .box {
      background: #2a356b;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
    }

    .big-box {
      background: #1c2650;
      border-radius: 22px;
      padding: 20px;
      margin-top: 16px;
    }

    h1 {
      margin: 0 0 15px;
      font-size: 28px;
    }

    .report-image {
      width: 100%;
      border-radius: 16px;
      display: none;
      margin-bottom: 12px;
    }

    .report-text {
      font-size: 18px;
      margin-top: 6px;
    }

    .subinfo {
      font-size: 13px;
      opacity: 0.7;
      margin-top: 8px;
    }

    .btn {
      display: block;
      text-align: center;
      padding: 16px;
      border-radius: 16px;
      margin-top: 16px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    .btn-red {
      background: #f04f45;
      color: white;
    }

    .btn-dark {
      background: #1e293b;
      color: white;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>MXLI AHORA</h1>

  <!-- 🔥 REPORTE AUTOMÁTICO -->
  <div class="big-box">

    <img id="reportImage" class="report-image">

    <div id="reportText" class="report-text">
      No hay reporte todavía
    </div>

    <div id="reportUpdated" class="subinfo"></div>

  </div>

  <!-- FECHA -->
  <div class="box" id="fechaBox">📅 Cargando...</div>

  <!-- HORA -->
  <div class="box" id="horaBox">⏰ Cargando...</div>

  <!-- CLIMA -->
  <div class="box">🌡️ 29°C</div>

  <!-- BOTONES -->
  <a href="https://bwt.cbp.gov/ViewAllPorts.html" target="_blank" class="btn btn-red">
    Ver tiempos oficiales
  </a>

  <a href="camaras.html" class="btn btn-dark">
    Ver cámaras en vivo
  </a>

</div>

<script>
function capitalizar(texto) {
  return texto.charAt(0).toUpperCase() + texto.slice(1);
}

function actualizarFechaHora() {
  const ahora = new Date();

  const fecha = new Intl.DateTimeFormat('es-MX', {
    timeZone: 'America/Tijuana',
    weekday: 'long',
    day: 'numeric',
    month: 'long'
  }).format(ahora);

  const hora = new Intl.DateTimeFormat('es-MX', {
    timeZone: 'America/Tijuana',
    hour: 'numeric',
    minute: '2-digit',
    hour12: true
  }).format(ahora);

  document.getElementById('fechaBox').textContent = '📅 ' + capitalizar(fecha);
  document.getElementById('horaBox').textContent = '⏰ ' + hora;
}

function cargarReporte() {
  const text = localStorage.getItem('mxli_report_text') || '';
  const image = localStorage.getItem('mxli_report_image') || '';
  const updated = localStorage.getItem('mxli_report_updated') || '';

  const reportImage = document.getElementById('reportImage');
  const reportText = document.getElementById('reportText');
  const reportUpdated = document.getElementById('reportUpdated');

  if (image) {
    reportImage.src = image;
    reportImage.style.display = 'block';
  } else {
    reportImage.style.display = 'none';
  }

  reportText.textContent = text || 'No hay reporte todavía';
  reportUpdated.textContent = updated ? 'Actualizado: ' + updated : '';
}

actualizarFechaHora();
cargarReporte();

setInterval(actualizarFechaHora, 1000);
setInterval(cargarReporte, 2000);
</script>

</body>
</html>
